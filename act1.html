<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>javascript: intro to function</title>
    <style>
        .new{
            height: 75px;
                width: 75px ;
                background-color: whitesmoke;
                transition: all 3s;
                display: flex;
                justify-content: center;
                align-content: center;
        }
    </style>
</head>
<body>
        <p id="demo"></p>
        <button onclick="displaysum(5)">show</button>
        <script>
            function displaysum(num1,num2){
                if(num2 == undefined){
                    num2=10;
                }
                document.getElementById("demo").innerHTML=num1+num2;
                document.getElementById("demo").classList.add("new");
            }
            
        </script>

</body>
</html>
